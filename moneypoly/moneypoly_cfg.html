
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono, monospace); background: transparent; color: var(--color-text-primary); }

.cfg-wrap { width: 100%; overflow-x: auto; padding: 8px 0 16px; }

.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  margin: 18px 0 4px 0;
  display: inline-block;
}

svg.cfg { width: 100%; display: block; }

/* node colors */
.n-entry   { fill: #2C2C2A; stroke: #444441; }
.n-exit    { fill: #2C2C2A; stroke: #444441; }
.n-proc    { fill: #E6F1FB; stroke: #378ADD; }
.n-decision{ fill: #FAEEDA; stroke: #BA7517; }
.n-return  { fill: #EAF3DE; stroke: #3B6D11; }
.n-error   { fill: #FCEBEB; stroke: #E24B4A; }
.n-loop    { fill: #EEEDFE; stroke: #7F77DD; }
.n-io      { fill: #E1F5EE; stroke: #1D9E75; }

.n-entry text, .n-exit text { fill: #F1EFE8; }
.n-proc text   { fill: #0C447C; }
.n-decision text{ fill: #633806; }
.n-return text { fill: #27500A; }
.n-error text  { fill: #791F1F; }
.n-loop text   { fill: #3C3489; }
.n-io text     { fill: #085041; }

@media (prefers-color-scheme: dark) {
  .n-proc    { fill: #0C447C; stroke: #85B7EB; }
  .n-decision{ fill: #633806; stroke: #FAC775; }
  .n-return  { fill: #27500A; stroke: #97C459; }
  .n-error   { fill: #791F1F; stroke: #F09595; }
  .n-loop    { fill: #3C3489; stroke: #AFA9EC; }
  .n-io      { fill: #085041; stroke: #5DCAA5; }
  .n-proc text   { fill: #B5D4F4; }
  .n-decision text{ fill: #FAC775; }
  .n-return text { fill: #C0DD97; }
  .n-error text  { fill: #F7C1C1; }
  .n-loop text   { fill: #CECBF6; }
  .n-io text     { fill: #9FE1CB; }
}

.arr { stroke: var(--color-text-secondary); stroke-width: 1.2; fill: none; }
.arr-yes { stroke: #3B6D11; stroke-width: 1.2; fill: none; }
.arr-no  { stroke: #791F1F; stroke-width: 1.2; fill: none; }
.arr-loop { stroke: #7F77DD; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }

.sec-bg { fill: none; stroke-width: 1; stroke-dasharray: 4 3; rx: 10; }
.sec-bg-main   { stroke: #378ADD; }
.sec-bg-player { stroke: #1D9E75; }
.sec-bg-dice   { stroke: #7F77DD; }
.sec-bg-prop   { stroke: #BA7517; }
.sec-bg-cards  { stroke: #E24B4A; }
.sec-bg-bank   { stroke: #639922; }
.sec-bg-board  { stroke: #D85A30; }
.sec-bg-ui     { stroke: #3C3489; }

.sec-title { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; }
.sec-title-main   { fill: #185FA5; }
.sec-title-player { fill: #0F6E56; }
.sec-title-dice   { fill: #534AB7; }
.sec-title-prop   { fill: #854F0B; }
.sec-title-cards  { fill: #A32D2D; }
.sec-title-bank   { fill: #3B6D11; }
.sec-title-board  { fill: #993C1D; }
.sec-title-ui     { fill: #3C3489; }

@media (prefers-color-scheme: dark) {
  .sec-title-main   { fill: #85B7EB; }
  .sec-title-player { fill: #5DCAA5; }
  .sec-title-dice   { fill: #AFA9EC; }
  .sec-title-prop   { fill: #FAC775; }
  .sec-title-cards  { fill: #F09595; }
  .sec-title-bank   { fill: #97C459; }
  .sec-title-board  { fill: #F0997B; }
  .sec-title-ui     { fill: #AFA9EC; }
}

text.lbl { font-size: 10px; fill: var(--color-text-secondary); }
text.edge-lbl { font-size: 9px; font-style: italic; }
text.edge-yes { fill: #3B6D11; font-size: 9px; font-style: italic; }
text.edge-no  { fill: #A32D2D; font-size: 9px; font-style: italic; }

.node-title { font-size: 12px; font-weight: 500; }
.node-sub   { font-size: 10px; }
</style>
</head>
